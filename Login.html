<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartExpense AI</title>

<link rel="stylesheet" href="Login.css">

</head>
<body>

<div class="card">



<img src="login-illustration.png"
     alt="Expense Illustration"
     class="login-image">

<h1>Welcome to SmartExpense AI</h1>

    <p class="subtitle">
        Track expenses, manage budgets,
        and achieve your financial goals with AI.
    </p>

    <div class="input-box">
        <input
            type="text"
            id="name"
            placeholder="Enter your name"
            autocomplete="off">
    </div>

    <div id="greeting" class="greeting"></div>

    <button
        id="continueBtn"
        class="btn"
        onclick="saveUser()"
        disabled>
        Continue →
    </button>

    <div class="footer">
        🔒 <strong>Secure & Private</strong><br>
        Your data stays on your device.
    </div>

</div>

<script>

const nameInput =
document.getElementById("name");

const greeting =
document.getElementById("greeting");

const continueBtn =
document.getElementById("continueBtn");
history.pushState(null, null, location.href);

window.addEventListener("popstate", () => {
    history.pushState(null, null, location.href);
});
nameInput.focus();

nameInput.addEventListener("input", () => {

    const name =
    nameInput.value.trim();

    if(name.length > 0){

        greeting.textContent =
        `Hello, ${name} 👋`;

        continueBtn.disabled = false;

    }else{

        greeting.textContent = "";

        continueBtn.disabled = true;

    }

});

function saveUser(){

    const name =
    nameInput.value.trim();

    if(name === "") return;

    localStorage.setItem(
        "userName",
        name
    );

    localStorage.setItem(
        "onboardingDone",
        "true"
    );

    window.location.href="Setup.html";
}

</script>

</body>
</html>
