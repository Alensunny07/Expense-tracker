<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartExpense AI</title>

<link rel="stylesheet" href="Login.css">

</head>
<body>

<div class="card">



<img src="login-illustration.png"
     alt="Expense Illustration"
     class="login-image">

<h1>Welcome to SmartExpense AI</h1>

    <p class="subtitle">
        Track expenses, manage budgets,
        and achieve your financial goals with AI.
    </p>

  <div class="input-box">
    <input
        type="email"
        id="email"
        placeholder="Email Address">
</div>

<div class="input-box">
    <input
        type="password"
        id="password"
        placeholder="Password">
</div>

<button class="btn" onclick="loginUser()">
    Login
</button>

<div class="divider">
    <span>OR</span>
</div>

<button class="google-btn" onclick="googleLogin()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
    Continue with Google
</button>

<p class="signup-text">
    Don't have an account?
    <a href="Signup.html">Create Account</a>
</p>

<p class="forgot">
    <a href="#">Forgot Password?</a>
</p>

    <div id="greeting" class="greeting"></div>

    <button
        id="continueBtn"
        class="btn"
        onclick="saveUser()"
        disabled>
        Continue →
    </button>

    <div class="footer">
        🔒 <strong>Secure & Private</strong><br>
        Your data stays on your device.
    </div>

</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="login.js"></script>
</body>
</html>
