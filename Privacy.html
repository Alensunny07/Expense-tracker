<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Privacy & Security</title>

<style>

body{
    font-family:'Segoe UI',sans-serif;
    background:#0F172A;
    color:white;
    padding:20px;
}

.card{
    background:#1E293B;
    padding:20px;
    border-radius:20px;
    margin-bottom:15px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.item{
    margin-bottom:15px;
}

.title{
    font-weight:bold;
    margin-bottom:5px;
}

.desc{
    color:#94A3B8;
    font-size:14px;
}

.btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    margin-top:10px;
    font-size:16px;
    font-weight:600;
}

.clear-btn{
    background:#EF4444;
    color:white;
}

.back-btn{
    background:#2563EB;
    color:white;
}

</style>
</head>
<body>

<h1>🛡️ Privacy & Security</h1>

<div class="card">

<div class="item">
<div class="title">Local Storage</div>
<div class="desc">
Your data is stored only on your device.
</div>
</div>

<div class="item">
<div class="title">No Cloud Storage</div>
<div class="desc">
No personal data is uploaded to any server.
</div>
</div>

<div class="item">
<div class="title">Secure Access</div>
<div class="desc">
Only you can access your expense records on this device.
</div>
</div>

</div>

<div class="card">

<h3>⚠️ Data Management</h3>

<button class="btn clear-btn"
onclick="clearData()">
Delete All Data
</button>

</div>

<button class="btn back-btn"
onclick="history.back()">
← Back
</button>

<script>

function clearData(){

if(confirm(
"Delete all app data permanently?"
)){

localStorage.clear();

alert("All data deleted.");

window.location.href="Login.html";

}

}

</script>

</body>
</html>
