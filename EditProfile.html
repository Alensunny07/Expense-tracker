<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#0F172A;
padding:20px;
color:white;
}

.header{
display:flex;
align-items:center;
gap:15px;
margin-bottom:25px;
}

.back-btn{
width:45px;
height:45px;
border:none;
border-radius:12px;
background:#1E293B;
color:white;
font-size:18px;
cursor:pointer;
}

.card{
background:#1E293B;
padding:20px;
border-radius:20px;
}

.input-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:8px;
font-size:14px;
color:#CBD5E1;
}

input,
textarea{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#0F172A;
color:white;
font-size:15px;
outline:none;
}

textarea{
height:120px;
resize:none;
}

.save-btn{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:15px;
background:linear-gradient(
135deg,
#8B5CF6,
#3B82F6
);
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;
}

.save-btn:hover{
opacity:.9;
}

</style>
</head>
<body>

<div class="header">
<button class="back-btn"
onclick="history.back()">
<i class="fa-solid fa-arrow-left"></i>
</button>

<h2>Edit Profile</h2>
</div>

<div class="card">

<div class="input-group">
<label>Occupation</label>
<input type="text"
id="occupation">
</div>

<div class="input-group">
<label>Location</label>
<input type="text"
id="location">
</div>

<div class="input-group">
<label>Financial Goal</label>
<input type="text"
id="goal">
</div>

<div class="input-group">
<label>About Me</label>
<textarea id="about"></textarea>
</div>

<button class="save-btn"
onclick="saveProfile()">
Save Changes
</button>

</div>

<script>
  const userName = localStorage.getItem("userName");

if (!userName || userName.trim() === "") {
    window.location.replace("Login.html");
}

document.getElementById("occupation").value =
localStorage.getItem("occupation") || "";

document.getElementById("location").value =
localStorage.getItem("location") || "";

document.getElementById("goal").value =
localStorage.getItem("goal") || "";

document.getElementById("about").value =
localStorage.getItem("about") || "";

function saveProfile(){

localStorage.setItem(
"occupation",
document.getElementById("occupation").value
);

localStorage.setItem(
"location",
document.getElementById("location").value
);

localStorage.setItem(
"goal",
document.getElementById("goal").value
);

localStorage.setItem(
"about",
document.getElementById("about").value
);

alert("Profile Updated Successfully!");

window.location.href =
"Profile.html";

}

</script>

</body>
</html>
